<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>orbit-wars leaderboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0 auto; max-width: 1100px; padding: 16px;
  }
  h1 { font-size: 1.3rem; margin: 0 0 4px; }
  #meta { color: #888; font-size: 0.85rem; margin-bottom: 12px; }
  #controls { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; font-size: 0.9rem; }
  #controls label { display: flex; gap: 6px; align-items: center; }
  #chart { width: 100%; height: 600px; }
  button.active { font-weight: bold; text-decoration: underline; }
</style>
</head>
<body>
<h1>Kaggle orbit-wars — leaderboard over time</h1>
<div id="meta">loading…</div>
<div id="controls">
  <span>
    Metric:
    <button id="btn-rank" class="active" onclick="setMetric('rank')">rank</button>
    <button id="btn-score" onclick="setMetric('score')">score</button>
  </span>
  <label>Show:
    <select id="view" onchange="draw()">
      <option value="near5" selected>±5 around me</option>
      <option value="near10">±10 around me</option>
      <option value="top10">top 10</option>
      <option value="top20">top 20</option>
      <option value="top50">top 50</option>
    </select>
  </label>
  <span style="color:#888">(click legend entries to hide/show teams)</span>
</div>
<div id="chart"></div>
<h2 style="font-size:1.05rem; margin:20px 0 8px">Zone persistence (share of all snapshots)</h2>
<table id="zonetable"></table>
<style>
  #zonetable { border-collapse: collapse; font-size: 0.9rem; min-width: 480px; }
  #zonetable th, #zonetable td { padding: 4px 14px 4px 0; text-align: right; }
  #zonetable th:nth-child(2), #zonetable td:nth-child(2) { text-align: left; }
  #zonetable th { border-bottom: 1px solid #888; }
  #zonetable tr.me { color: crimson; font-weight: bold; }
  #zonetable td.green { color: #2e9e4f; }
  #zonetable td.gold { color: #b8960c; }
</style>

<script>
const MY_TEAM = "Slawek Biel";
let metric = "rank";
let top50 = [], mine = [];

// Minimal quote-aware CSV parser (team names may contain commas).
function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else field += c;
    } else if (c === '"') inQuotes = true;
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n" || c === "\r") {
      if (field !== "" || row.length) { row.push(field); rows.push(row); row = []; field = ""; }
    } else field += c;
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.map(r => Object.fromEntries(header.map((h, i) => [h, r[i]])));
}

const toISO = ts => ts.replace(" ", "T") + "Z";
// Plotly has no timezone support — give it pre-converted local-time strings.
const toLocal = ts => new Date(toISO(ts)).toLocaleString("sv-SE");
const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

// Fetch data straight from the repo, not the Pages deployment: Pages only
// redeploys the site on each commit (and occasionally fails), while raw
// always serves the latest committed data. Relative paths for local testing.
const DATA_BASE = location.hostname.endsWith("github.io")
  ? "https://raw.githubusercontent.com/slawekslex/orbit-lb/main/" : "";

async function fetchCSV(name) {
  const resp = await fetch(`${DATA_BASE}${name}?t=${Date.now()}`, { cache: "no-store" });
  if (!resp.ok) throw new Error(`${name}: HTTP ${resp.status}`);
  return parseCSV(await resp.text());
}

function setMetric(m) {
  metric = m;
  document.getElementById("btn-rank").classList.toggle("active", m === "rank");
  document.getElementById("btn-score").classList.toggle("active", m === "score");
  draw();
}

function draw() {
  if (!top50.length) return;
  const view = document.getElementById("view").value;

  const lastTs = top50[top50.length - 1].timestamp_utc;
  const latest = top50.filter(r => r.timestamp_utc === lastTs)
                      .sort((a, b) => +a.rank - +b.rank);

  const myLatest = mine[mine.length - 1];
  const myRank = myLatest ? +myLatest.rank
    : +(latest.find(r => r.team === MY_TEAM)?.rank ?? 20);

  let picked;
  if (view.startsWith("near")) {
    const k = +view.slice(4);
    picked = latest.filter(r => Math.abs(+r.rank - myRank) <= k);
  } else {
    picked = latest.slice(0, +view.slice(3));
  }
  const teams = picked.map(r => r.team).filter(t => t !== MY_TEAM);

  const byTeam = {};
  for (const r of top50) (byTeam[r.team] ??= []).push(r);

  const traces = teams.map(team => ({
    name: team,
    x: byTeam[team].map(r => toLocal(r.timestamp_utc)),
    y: byTeam[team].map(r => +r[metric]),
    mode: "lines+markers",
    marker: { size: 4 },
    line: { width: 1.5 },
    opacity: 0.75,
  }));

  const my = mine.length ? mine : (byTeam[MY_TEAM] || []);
  if (my.length) traces.push({
    name: `${MY_TEAM} (me)`,
    x: my.map(r => toLocal(r.timestamp_utc)),
    y: my.map(r => +r[metric]),
    mode: "lines+markers",
    marker: { size: 6 },
    line: { width: 3.5, color: "crimson" },
  });

  const goldCutoff = 19; // top 10 + 0.2% of the (frozen) 4730-team field
  const goldLine = metric === "rank" ? {
    shapes: [{ type: "line", xref: "paper", x0: 0, x1: 1,
               y0: goldCutoff + 0.5, y1: goldCutoff + 0.5,
               line: { color: "gold", width: 1.5, dash: "dash" } }],
    annotations: [{ xref: "paper", x: 0.01, y: goldCutoff + 0.5, yanchor: "bottom",
                    text: `gold (top ${goldCutoff})`, showarrow: false,
                    font: { color: "gold", size: 11 } }],
  } : {};

  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  Plotly.newPlot("chart", traces, {
    margin: { t: 20, r: 10 },
    xaxis: { title: TZ },
    yaxis: { title: metric, autorange: metric === "rank" ? "reversed" : true },
    ...goldLine,
    hovermode: "closest",
    legend: { orientation: "h", y: -0.18 },
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor: "rgba(0,0,0,0)",
    font: { color: dark ? "#ddd" : "#333" },
  }, { responsive: true, displaylogo: false });
}

function buildTable() {
  const snaps = [...new Set(top50.map(r => r.timestamp_utc))];
  const nSnap = snaps.length;
  const lastTs = snaps[snaps.length - 1];

  const stats = {};
  for (const r of top50) {
    const s = (stats[r.team] ??= { green: 0, gold: 0, latest: null });
    const rank = +r.rank;
    if (rank <= 10) s.green++;
    if (rank <= 19) s.gold++;
    if (r.timestamp_utc === lastTs) s.latest = rank;
  }

  const rows = Object.entries(stats)
    .map(([team, s]) => ({ team, green: 100 * s.green / nSnap, gold: 100 * s.gold / nSnap, latest: s.latest }))
    .sort((a, b) => b.green - a.green || b.gold - a.gold || (a.latest ?? 999) - (b.latest ?? 999))
    .slice(0, 25);

  const table = document.getElementById("zonetable");
  table.innerHTML = "";
  const head = table.insertRow();
  for (const h of ["#", "team", "green (top 10) %", "gold (top 19) %", "latest rank"]) {
    const th = document.createElement("th");
    th.textContent = h;
    head.appendChild(th);
  }
  rows.forEach((r, i) => {
    const tr = table.insertRow();
    if (r.team === MY_TEAM) tr.className = "me";
    const cells = [i + 1, r.team, r.green.toFixed(1), r.gold.toFixed(1), r.latest ?? "50+"];
    cells.forEach((v, j) => {
      const td = tr.insertCell();
      td.textContent = v;
      if (j === 2) td.className = "green";
      if (j === 3) td.className = "gold";
    });
  });
}

async function load() {
  try {
    [top50, mine] = await Promise.all([
      fetchCSV("top50_history.csv"),
      fetchCSV("rank_history.csv").catch(() => []),
    ]);
    const lastTs = top50[top50.length - 1].timestamp_utc;
    const ageMin = Math.round((Date.now() - new Date(toISO(lastTs))) / 60000);
    const me = mine[mine.length - 1];
    document.getElementById("meta").textContent =
      `last snapshot: ${toLocal(lastTs)} (${ageMin} min ago)` +
      (me ? ` — my rank: ${me.rank}/${me.total_teams}, score ${me.score}` : "");
    draw();
    buildTable();
  } catch (e) {
    document.getElementById("meta").textContent = `failed to load data: ${e.message}`;
  }
}

load();
setInterval(load, 5 * 60 * 1000); // refresh data every 5 minutes
</script>
</body>
</html>
