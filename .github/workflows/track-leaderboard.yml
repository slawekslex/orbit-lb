name: Track leaderboard

# GitHub's cron scheduler is best-effort and heavily throttled for short
# intervals, so instead of relying on it each run loops internally every
# 15 minutes for ~5.7h (just under the 6h job limit), then dispatches its
# own successor. The hourly cron is only a backstop that restarts the
# chain if it ever dies. The concurrency group guarantees at most one
# running loop plus one queued successor.

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: track-leaderboard
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install kaggle

      - name: Track every 15 minutes
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_TEAM: "Slawek Biel"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          end=$((SECONDS + 340 * 60))
          while [ "$SECONDS" -lt "$end" ]; do
            if python track_rank.py; then
              git add -- *.csv
              git diff --cached --quiet || git commit -m "Update leaderboard data"
              git pull --rebase && git push || echo "push failed, retrying next cycle"
            else
              echo "leaderboard fetch failed, retrying next cycle"
            fi
            sleep 900
          done

      - name: Chain next run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run track-leaderboard.yml --ref main --repo "$GITHUB_REPOSITORY"
